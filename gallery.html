<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 웹페이지</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <h1>커스텀 라이프</h1>
    </header>  

    <nav>
        <a href="index.html">홈으로</a>
        <a href="subject.html">전공 탐구</a>
        <a href="gallery.html">갤러리</a>
    </nav>

    <main>
        <div id="login-box" style="text-align: center; margin: 50px;">
            <h2>🔒 시스템 인증이 필요합니다</h2>
            <input type="text" id="userName" placeholder="사용자 이름" /><br>
            <input type="password" id="userPw" placeholder="암호 입력" /><br>
            <button onclick="checkLogin()">입장하기</button>
        </div>

        <div id="secret-area" style="display: none;">
            <h3 style="color: #2e7d32;">👋 <span id="user-display"></span>님, 반갑습니다!</h3>
            
            <div class="display-box">
                <img id="targetimg" src="./image/crop1.jpg" style="width: 100%; max-width: 500px;"/>
                <p id="targetDesc">4월 7일: 망고 첫 수확!</p>
            </div>
            <div class="thumb-list">
                <img src="./image/crop1.jpg" onclick="show('./image/crop1.jpg','4월 7일:망고 첫수확')"/>
                <img src="./image/crop2.jpg" onclick="show('./image/crop2.jpg','4월 8일:비료주기완료')"/>
                <img src="./image/cropi3.jpg" onclick="show('./image/cropi3.jpg','4월 9일:망고캐릭터')"/>
                <img src="./image/crop4.jpg" onclick="show('./image/crop4.jpg','4월 10일:생망고')"/>
                <img src="./image/cropi10.jpg" onclick="show('./image/cropi10.jpg','4월 11일:망고주스')"/>
                <img src="./image/cropi6.jpg" onclick="show('./image/cropi6.jpg','4월 12일:망고나무')"/>
                <img src="./image/crop7.jpg" onclick="show('./image/crop7.jpg','4월 13일:망고요거트')"/>
                <img src="./image/crop8.jpg" onclick="show('./image/crop8.jpg','4월 14일:망고젤리')"/>
                <img src="./image/cropi9.jpg" onclick="show('./image/cropi9.jpg','4월 15일:망고빙수')"/>
                <img src="./image/cropi11.jpg" onclick="show('./image/cropi11.jpg','4월 16일:냉동망고')"/>
                <img src="./image/cropi12.jpg" onclick="show('./image/cropi12.jpg','4월 17일:건망고')"/>

            </div>
            <hr>
            <div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background: #fff;">
                <h4>🔑 시스템 보안 설정</h4>
                <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
                <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
                <button onclick="changePassword()">비밀번호 변경</button>
                <button onclick="logout()">로그아웃</button>
            </div>
        </div> 
    </main>

    <footer>
        문의 : meverlick678@gmail.com, &copy; all right reserved by 2026 ㅁㅈㅎ
    </footer>

    <script>
        function show(imgPath,text) {
            document.getElementById("targetimg").src=imgPath;
            document.getElementById("targetDesc").innerText=text;
        }

        function checkLogin() {
            let name = document.getElementById("userName").value;
            let pw = document.getElementById("userPw").value;

            let currentPw = localStorage.getItem("userPassword") || "0000";

            if (pw === currentPw && name !== "") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("savedName", name);
                localStorage.setItem("userPassword", currentPw);

                alert(name + "님, 인증 정보가 저장소에 기록되었습니다.");

                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = name;

            } else {
                alert("이름을 입력하지 않았거나 암호가 틀렸습니다.");
            }
        }

        window.onload = function() {
            let isLoggedIn = localStorage.getItem("isLoggedIn");
            let savedName = localStorage.getItem("savedName");
            if (isLoggedIn === "true") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = savedName;
            }
        };

        function changePassword() {
            let newPw = document.getElementById("newPw").value;
            if (newPw.length < 4) { 
                alert("암호는 4자리 이상이어야 합니다."); 
                return; 
            }
            localStorage.setItem("userPassword", newPw);
            alert("비밀번호가 변경되었습니다.");  
        }

        function logout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("savedName");
                location.href = "index.html";
            }
        }
    </script>
</body>
</html>
