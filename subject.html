<main>
<section class="agriculture-portfolio">
 <article class="crop-item">

    <figure class="crop-image">
        <img src="image/mango.jpg" alt="직접제배한농작물사진" />
        <figcaption></figcaption>
    </figure>
<div class="crop-details">
    <h3>농작물 명칭:무지개 망고</h3>

    <section class="info-block">
        <h4>재배및생산특성</h4>
        <ul>
            <li><strong>품종:</strong>무지개 망고 (마하차녹)</li>
            <li><strong>재배 환경</strong>:열대 및 아열대 기후</li>
        </ul>
    </section>
    <section class="info-block distribution">
        <h4>유통구조설계</h4>
        <div class="step-guide">
        <span>태국 농장</span>→<span>한국 망고전용 물류센터</span>→<span>소비자(일반인, 카페, 호텔 등등)</span>
        </div>
        <ul>
            <li><strong>물류방식:</strong>항공 운송, 증열 처리, 개별포장</li>
              <li><strong>판매 전략:</strong>예약판매, 프랜차이즈 납품</li>
        </ul>
    </section>
</div> 

</article>   
</section>
        <section id="order-area">
        <hr>
        <h2> 📦온라인 주문하기</h2>
        <form>
           <div class="input-row">
    <div class="input-group">
        <label>주문자성함</label>
        <input type="text" id="userName" placeholder="실명을 입력하세요">
    </div>
    <div class="input-group">
        <label>연락처</label>
        <input type="text" id="userPhone" placeholder="010-0000-0000">
    </div>
</div>

<div class="input-row">
    <div class="input-group">
        <label class="unitWeight">구매단위선택</label>
        <select id="unitWeight">
            <option value="15000">무지개망고(마하차녹) 1kg (15,000)</option>
            <option value="40000">무지개망고(마하차녹) 3kg (40,000)</option>
            <option value="60000">무지개망고(마하차녹) 5kg (60,000)</option>
    </select>
    </div>
<div class="input-group">
    <label for="quantity">주문수량(박스)</label>
    <input type="number" id="quantity" value="1" min="1" max="10">
</div>
</div>

            
            <div class="input-group">
                <label for="">배송 방식 선택</label>
                <select name="" id="deliveryFee">
                    <option value="3000">일반 택배 (3000원)</option>
                    <option value="5000">신선 새벽 배송 (5000원)</option>
                    <option value="0">광주 로컬푸드 매장 픽업 (무료)</option>
                </select>
            </div>

            <div class="input-group">
                <label>배송 메시지</label>
                <textarea placeholder="부재시 문 앞에 놓아주세요"></textarea>
            </div>
            <button type="button" class="order-btn" onclick="processOrder()">지금 바로 주문 완료
            </button>
        <div id="receipt" class="receipt-box"></div>
        </form>
        </section>
</main>
<footer>

    문의 : meverlick678@gmail.com, &copy; all right reserved by 2026 민정환
    
</footer>

<script>
    function processOrder() {
        let name = document.getElementById('userName').value;
        let phone = document.getElementById('userPhone').value;
        
        
        if (name === "" || phone === "") {
            alert("⚠️ 성함과 연락처를 모두 입력해 주세요!");
            return;
        }

        
        let quantity = Number(document.getElementById("quantity").value);
        let feeValue = document.getElementById("deliveryFee").value;     
        let deliveryFee = Number(document.getElementById("deliveryFee").value);
        
        let unitSelect = document.getElementById('unitWeight');          
        let productPrice = Number(unitSelect.value);                     
        let productName = unitSelect.options[unitSelect.selectedIndex].text; 
        
        let basePrice = productPrice * quantity; 

       
        if (basePrice >= 30000) {
            deliveryFee = 0;
        }

        let totalPrice = basePrice + deliveryFee;
        let dateString = new Date().toLocaleString();
        
        let receipt = document.getElementById('receipt');
        
       
        receipt.innerHTML = `
        <h3>🧾 주문 확인 영수증</h3>
        <p style="color: gray; font-size: 0.8em;">주문 시각: ${dateString}</p>
        <hr>
        <p><strong>주문자:</strong>   ${name} 님</p>
        <p><strong>주문상품:</strong> ${productName}</p>
        <p><strong>주문수량:</strong> ${quantity} 박스</p>
        <p><strong>상품총액:</strong> ${basePrice.toLocaleString()}원</p>
        <p><strong>배송비:</strong>
            ${deliveryFee === 0 ? "무료배송" : deliveryFee.toLocaleString() + "원"}
        </p>
        <p style="font-size: 1.2em; margin-top: 10px;">
            <strong>최종결제금액:
            <span style="color:red;">${totalPrice.toLocaleString()}원</span>
            </strong>
        </p>
        <hr>
        <p style="text-align:center;">이용해주셔서 감사합니다!🥫</p>
        `;
        
        receipt.style.display = "block";
    }
</script>
</script>
</body>
</html>
